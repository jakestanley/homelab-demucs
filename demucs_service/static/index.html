<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Demucs Local Service</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f4f1ec;
        --panel: #ffffff;
        --ink: #1a1a1a;
        --muted: #5d5d5d;
        --accent: #2a5a8a;
        --accent-2: #c98f1d;
        --border: #d9d2c8;
        font-family: "Space Grotesk", "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        background: radial-gradient(circle at top, #fff8ef, #efe8de 55%, #e6ded2 100%);
        color: var(--ink);
      }

      header {
        padding: 2.5rem clamp(1.5rem, 4vw, 4rem) 1.5rem;
        display: flex;
        flex-direction: column;
        gap: 0.25rem;
      }

      h1 {
        font-size: clamp(2rem, 4vw, 3rem);
        margin: 0;
        letter-spacing: -0.02em;
      }

      .subtitle {
        color: var(--muted);
        font-size: 1rem;
      }

      main {
        display: grid;
        gap: 1.5rem;
        padding: 0 clamp(1.5rem, 4vw, 4rem) 3rem;
      }

      .grid {
        display: grid;
        gap: 1.5rem;
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      }

      .card {
        background: var(--panel);
        border-radius: 18px;
        border: 1px solid var(--border);
        padding: 1.25rem;
        box-shadow: 0 16px 32px rgba(30, 30, 30, 0.08);
      }

      .card h2 {
        margin: 0 0 0.75rem;
        font-size: 1.2rem;
      }

      button,
      select,
      input[type="text"] {
        font-family: inherit;
        font-size: 0.95rem;
        padding: 0.6rem 0.75rem;
        border-radius: 10px;
        border: 1px solid var(--border);
      }

      button {
        cursor: pointer;
        background: var(--accent);
        color: white;
        border: none;
      }

      button.secondary {
        background: var(--accent-2);
      }

      button.ghost {
        background: transparent;
        color: var(--accent);
        border: 1px solid var(--accent);
      }

      button.danger {
        background: #b11f1f;
        color: #fff;
      }

      .status-pill {
        padding: 0.35rem 0.7rem;
        border-radius: 999px;
        font-size: 0.85rem;
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        background: #eef2f7;
        color: var(--accent);
      }

      .muted {
        color: var(--muted);
        font-size: 0.9rem;
      }

      .jobs {
        display: grid;
        gap: 0.75rem;
      }

      .job {
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 0.75rem;
        background: #fdfbf8;
      }

      .job h3 {
        margin: 0 0 0.5rem;
        font-size: 1rem;
      }

      .job .meta {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem 1rem;
        font-size: 0.85rem;
      }

      .progress {
        height: 8px;
        border-radius: 999px;
        background: #e6e0d7;
        overflow: hidden;
        margin-top: 0.5rem;
      }

      .progress > span {
        display: block;
        height: 100%;
        background: linear-gradient(90deg, var(--accent), #62a0d1);
      }

      .row {
        display: flex;
        flex-wrap: wrap;
        gap: 0.75rem;
        align-items: center;
      }

      .job-monitor {
        min-height: 120px;
      }

      .download-link {
        display: inline-block;
        margin-top: 0.5rem;
      }

      @media (max-width: 700px) {
        header {
          padding-top: 2rem;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Demucs Local Separation</h1>
      <div class="subtitle">Windows service · async jobs · polling</div>
    </header>
    <main>
      <div class="grid">
        <section class="card">
          <h2>Status</h2>
          <div class="status-pill" id="status-pill">Loading…</div>
          <div class="muted" id="worker-status"></div>
          <div class="muted" id="job-status"></div>
          <div class="muted" id="storage-status"></div>
          <div class="row" style="margin-top: 1rem">
            <button id="start-btn">Start</button>
            <button class="secondary" id="stop-btn">Stop</button>
            <button class="ghost" id="refresh-btn">Refresh</button>
          </div>
          <div class="row" style="margin-top: 0.75rem">
            <button class="danger" id="clear-caches-btn" style="width: 100%; font-weight: 700">
              Clear all caches and jobs
            </button>
          </div>
          <div class="muted" id="clear-caches-status"></div>
        </section>
        <section class="card">
          <h2>Submit Job</h2>
          <div class="row">
            <label>
              Mode
              <select id="mode-select">
                <option value="4">4 stems</option>
                <option value="2">2 stems (vocals)</option>
                <option value="both">both</option>
              </select>
            </label>
            <label>
              Model
              <select id="model-select"></select>
            </label>
          </div>
          <div class="row" style="margin-top: 0.75rem">
            <input id="job-label" type="text" placeholder="Job label (optional)" />
            <input id="file-input" type="file" accept=".mp3" />
          </div>
          <div class="row" style="margin-top: 0.75rem">
            <button id="submit-btn">Queue</button>
            <span class="muted" id="submit-status"></span>
          </div>
        </section>
      </div>

      <section class="card">
        <h2>Running Jobs</h2>
        <div class="jobs" id="jobs-list"></div>
      </section>

      <section class="card">
        <h2>Job Monitor</h2>
        <div class="job-monitor" id="job-monitor">Select a job to monitor.</div>
      </section>
    </main>

    <script>
      const statusPill = document.getElementById("status-pill");
      const workerStatus = document.getElementById("worker-status");
      const jobStatus = document.getElementById("job-status");
      const storageStatus = document.getElementById("storage-status");
      const modelSelect = document.getElementById("model-select");
      const modeSelect = document.getElementById("mode-select");
      const fileInput = document.getElementById("file-input");
      const submitBtn = document.getElementById("submit-btn");
      const submitStatus = document.getElementById("submit-status");
      const jobsList = document.getElementById("jobs-list");
      const jobMonitor = document.getElementById("job-monitor");
      const clearCachesBtn = document.getElementById("clear-caches-btn");
      const clearCachesStatus = document.getElementById("clear-caches-status");
      let activeJobId = null;

      async function fetchJson(url, options) {
        const res = await fetch(url, options);
        if (!res.ok) {
          const body = await res.json().catch(() => ({}));
          throw new Error(body.message || body.error || `Request failed (${res.status})`);
        }
        return res.json();
      }

      function formatBytes(bytes) {
        if (!Number.isFinite(bytes) || bytes < 0) return "n/a";
        const units = ["B", "KB", "MB", "GB", "TB"];
        let value = bytes;
        let unit = units[0];
        for (let i = 0; i < units.length - 1 && value >= 1024; i += 1) {
          value /= 1024;
          unit = units[i + 1];
        }
        return `${value.toFixed(value >= 100 || unit === "B" ? 0 : 1)} ${unit}`;
      }

      async function loadStatus() {
        const status = await fetchJson("/api/status");
        const paused = status.paused;
        statusPill.textContent = paused ? "Paused" : "Running";
        statusPill.style.background = paused ? "#f7e6d1" : "#e2f3e6";
        statusPill.style.color = paused ? "#9a5c1c" : "#1f6f3a";
        workerStatus.textContent = `Worker: ${paused ? "paused" : "running"}`;
        const runningJobs = Array.isArray(status.running_jobs) ? status.running_jobs.length : 0;
        jobStatus.textContent = `Active jobs: ${runningJobs}`;
        const volume = status.storage_volume;
        if (volume && Number.isFinite(volume.free_bytes)) {
          storageStatus.textContent = `Storage volume (${volume.path}): ${formatBytes(volume.free_bytes)} free of ${formatBytes(volume.total_bytes)}`;
        } else {
          storageStatus.textContent = "Storage volume: unavailable";
        }
      }

      async function loadModels() {
        const data = await fetchJson("/api/models");
        modelSelect.innerHTML = "";
        data.models.forEach((model) => {
          const option = document.createElement("option");
          option.value = model;
          option.textContent = model;
          if (model === data.default) {
            option.selected = true;
          }
          modelSelect.appendChild(option);
        });
      }

      async function loadJobs() {
        const data = await fetchJson("/api/jobs?limit=25");
        jobsList.innerHTML = "";
        if (!data.jobs.length) {
          jobsList.textContent = "No jobs yet.";
          return;
        }
        data.jobs.forEach((job) => {
          const div = document.createElement("div");
          div.className = "job";
          div.innerHTML = `
            <h3>${job.input.job_label || job.id}</h3>
            <div class="meta">
              <span>Status: ${job.status}</span>
              <span>${job.progress.processed}/${job.progress.total} complete</span>
              <span>${job.message}</span>
            </div>
            <div class="progress"><span style="width: ${progressPercent(job)}%"></span></div>
          `;
          div.addEventListener("click", () => {
            activeJobId = job.id;
            renderJobMonitor(job);
          });
          jobsList.appendChild(div);
        });
      }

      function progressPercent(job) {
        if (!job.progress.total) return 0;
        return Math.min(
          100,
          Math.round(((job.progress.processed + job.progress.errors) / job.progress.total) * 100)
        );
      }

      function renderJobMonitor(job) {
        const progress = progressPercent(job);
        const download = job.output.ready
          ? `<a class="download-link" href="/api/jobs/${job.id}/output">Download output</a>`
          : "";
        jobMonitor.innerHTML = `
          <div>
            <strong>${job.input.job_label || job.id}</strong>
            <div class="muted">${job.message}</div>
            <div class="muted">Step: ${job.progress.step || "n/a"}</div>
            <div class="progress"><span style="width:${progress}%"></span></div>
            <div class="muted">${job.progress.processed}/${job.progress.total} processed · ${job.progress.errors} errors</div>
            ${download}
          </div>
        `;
      }

      async function pollActiveJob() {
        if (!activeJobId) return;
        try {
          const job = await fetchJson(`/api/jobs/${activeJobId}`);
          renderJobMonitor(job);
        } catch (err) {
          console.error(err);
        }
      }

      submitBtn.addEventListener("click", async () => {
        submitStatus.textContent = "";
        const files = fileInput.files;
        if (files.length !== 1) {
          submitStatus.textContent = "Select exactly one mp3.";
          return;
        }
        const form = new FormData();
        form.append("mode", modeSelect.value);
        form.append("model", modelSelect.value);
        const jobLabel = document.getElementById("job-label").value;
        if (jobLabel) {
          form.append("job_label", jobLabel);
        }
        form.append("file", files[0]);
        submitBtn.disabled = true;
        submitStatus.textContent = "Uploading…";
        try {
          const data = await fetchJson("/api/jobs", { method: "POST", body: form });
          submitStatus.textContent = `Queued ${data.id}`;
          activeJobId = data.id;
          fileInput.value = "";
          await loadJobs();
        } catch (err) {
          submitStatus.textContent = err.message;
        } finally {
          submitBtn.disabled = false;
        }
      });

      document.getElementById("start-btn").addEventListener("click", async () => {
        await fetchJson("/api/start", { method: "POST" });
        await loadStatus();
      });

      document.getElementById("stop-btn").addEventListener("click", async () => {
        await fetchJson("/api/stop", { method: "POST" });
        await loadStatus();
      });

      document.getElementById("refresh-btn").addEventListener("click", async () => {
        await loadStatus();
        await loadJobs();
      });

      clearCachesBtn.addEventListener("click", async () => {
        const confirmed = window.confirm(
          "This permanently deletes all cached artifacts and all job records. Continue?"
        );
        if (!confirmed) return;
        clearCachesBtn.disabled = true;
        clearCachesStatus.textContent = "Clearing caches...";
        try {
          await fetchJson("/api/admin/clear-caches", { method: "POST" });
          clearCachesStatus.textContent = "Caches and jobs cleared.";
          activeJobId = null;
          jobMonitor.textContent = "Select a job to monitor.";
          await loadStatus();
          await loadJobs();
        } catch (err) {
          clearCachesStatus.textContent = err.message;
        } finally {
          clearCachesBtn.disabled = false;
        }
      });

      async function boot() {
        await loadStatus();
        await loadModels();
        await loadJobs();
        setInterval(loadJobs, 4000);
        setInterval(pollActiveJob, 3000);
      }

      boot().catch((err) => {
        console.error(err);
        statusPill.textContent = "Error";
      });
    </script>
  </body>
</html>
